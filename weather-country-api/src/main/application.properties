# ===========================
# Application
# ===========================
quarkus.application.name=weather-api
quarkus.http.port=8080

# ===========================
# OpenAPI / Swagger
# ===========================
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=Weather API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Front-facing API for async weather lookups

# ===========================
# Database ? PostgreSQL
# ===========================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:weatheruser}
quarkus.datasource.password=${DB_PASSWORD:weatherpass}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:weatherdb}

quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true

# ===========================
# ActiveMQ Artemis / JMS
# ===========================
quarkus.artemis.url=tcp://${ARTEMIS_HOST:localhost}:${ARTEMIS_PORT:61616}
quarkus.artemis.username=${ARTEMIS_USER:admin}
quarkus.artemis.password=${ARTEMIS_PASSWORD:admin}

# Queue names
app.queue.request=weather.request.queue
app.queue.response=weather.response.queue

# Response consumer polling interval (ms)
app.response.consumer.poll-interval=2000

# ===========================
# Fault Tolerance defaults
# ===========================
app.retry.max-retries=3
app.retry.delay=200

# ===========================
# Health
# ===========================
quarkus.smallrye-health.ui.always-include=true

# ===========================
# Metrics
# ===========================
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# ===========================
# Logging
# ===========================
quarkus.log.level=INFO
quarkus.log.console.json=false

# ===========================
# Dev Services (local dev only ? Quarkus spins these up automatically)
# ===========================
%dev.quarkus.datasource.devservices.enabled=true
%dev.quarkus.artemis.devservices.enabled=true